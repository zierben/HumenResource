name: CI/CD Pipeline

on:
  push:
    branches: [master, develop, release/*]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod

env:
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build backend
        working-directory: ./hr-admin
        run: mvn clean package -DskipTests
          
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: hr-admin
          path: hr-admin/target/hr-admin-*.jar

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: hr-web/package-lock.json
          
      - name: Install and build frontend
        working-directory: ./hr-web
        run: |
          npm ci
          npm run build
        
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: hr-web-dist
          path: hr-web/dist

  test:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Run tests
        working-directory: ./hr-admin
        run: mvn test

  deploy:
    needs: [build-backend, build-frontend, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: hr-admin
          
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: hr-web-dist
          
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            # 从服务器本地配置文件读取数据库配置
            source /opt/hr-admin/.env 2>/dev/null || true
            
            # 使用默认值
            DB_HOST=${DB_HOST:-localhost}
            DB_PORT=${DB_PORT:-3306}
            DB_NAME=${DB_NAME:-hr_system}
            DB_USER=${DB_USER:-root}
            DB_PASSWORD=${DB_PASSWORD:-}
            
            # 停止旧服务
            cd /opt/hr-admin
            pm2 stop hr-admin 2>/dev/null || true
            
            # 备份数据库(如果有密码)
            if [ -n "$DB_PASSWORD" ]; then
              mysqldump -h$DB_HOST -P$DB_PORT -u$DB_USER -p$DB_PASSWORD $DB_NAME > /opt/hr-admin/backup/hr_system_$(date +%Y%m%d).sql 2>/dev/null || true
            fi
            
            # 复制新jar
            cp hr-admin-*.jar /opt/hr-admin/
            
            # 部署前端
            rm -rf /var/www/hr-web
            cp -r hr-web-dist /var/www/hr-web
            
            # 重启后端(从本地读取配置)
            cd /opt/hr-admin
            nohup java -jar hr-admin-*.jar > /opt/hr-admin/logs/app.log 2>&1 &
            
            # 等待启动
            sleep 15
            
            # 检查状态
            pm2 status
            curl -s http://localhost:8080/api/auth/login -X POST -H "Content-Type: application/json" -d '{}' | grep -q "code" && echo "部署成功" || echo "部署可能失败，请检查"
