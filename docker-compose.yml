version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hr-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: hr_system
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./hr-admin/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./hr-admin
      dockerfile: Dockerfile
    container_name: hr-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hr_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      JWT_SECRET: hr-system-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      JAVA_OPTS: -Xms512m -Xmx1024m
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - hr-network

  frontend:
    build:
      context: ./hr-web
      dockerfile: Dockerfile
    container_name: hr-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hr-network

volumes:
  mysql_data:

networks:
  hr-network:
    driver: bridge
